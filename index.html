<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運送案件マッチングシステム デモ｜サファリテック</title>
<style>
  :root{
    --bg:#eef2f6; --panel:#ffffff; --ink:#22303f; --sub:#6b7686; --line:#cfd9e4;
    --side:#d4e3f1; --side-2:#c5d8ec; --side-ink:#1f3a5f; --side-active:#ffffff;
    --blue:#3d6fb1; --blue-d:#315c95; --green:#4d9d63; --green-d:#3f8553;
    --navy:#2f4a6b; --warn:#c0392b; --warnbg:#fbecea; --pend:#9a6a00; --pendbg:#fdf3df;
    --okbg:#e7f4ec; --ok:#2f8a4e; --th:#eef3f9;
    --shadow:0 1px 2px rgba(20,40,70,.05),0 8px 24px rgba(20,40,70,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.65;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:var(--blue)}

  /* ===== top bar ===== */
  header{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;padding:0 18px;height:54px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.02em;font-size:15px}
  .brand .mk{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#3d6fb1,#5b9bd5);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
  .brand .bt-short{display:none}
  .spacer{flex:1}
  .role-switch{display:flex;align-items:center;gap:7px}
  .role-switch label{font-size:11px;color:var(--sub)}
  .role-switch select{padding:6px 9px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);font-size:12.5px}
  .mail-btn{position:relative;border:1px solid var(--line);background:#fff;border-radius:7px;padding:7px 11px;color:var(--ink);font-size:12.5px}
  .mail-btn .badge{position:absolute;top:-7px;right:-7px;background:var(--warn);color:#fff;border-radius:10px;
    font-size:11px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .logout{color:var(--sub);font-size:12.5px;text-decoration:none;border:none;background:none;padding:6px 4px}
  .logout:hover{color:var(--ink)}

  /* ===== shell ===== */
  .shell{display:flex;min-height:calc(100vh - 54px)}
  aside{width:212px;flex-shrink:0;background:var(--side);border-right:1px solid var(--side-2);padding:14px 12px}
  aside .me{font-size:12px;color:var(--side-ink);padding:6px 8px 12px;border-bottom:1px solid var(--side-2);margin-bottom:10px;line-height:1.5}
  aside .me b{display:block;font-size:13.5px;margin-bottom:2px}
  aside .nav{display:flex;flex-direction:column;gap:4px}
  aside .nav button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:none;background:none;
    color:var(--side-ink);padding:9px 11px;border-radius:8px;font-size:13.5px;font-weight:600}
  aside .nav button:hover{background:var(--side-2)}
  aside .nav button.active{background:var(--side-active);box-shadow:0 1px 3px rgba(30,58,95,.12)}
  aside .nav .ic{width:18px;text-align:center;opacity:.8}
  aside .reset{margin-top:18px;border:1px solid var(--side-2);background:rgba(255,255,255,.5);color:var(--side-ink);
    width:100%;padding:7px;border-radius:7px;font-size:11.5px}

  main{flex:1;padding:24px 28px 70px;min-width:0}
  .crumb{font-size:12px;color:var(--sub);margin-bottom:6px}
  h1{font-size:19px;margin:0 0 4px}
  .lead{color:var(--sub);font-size:13px;margin:0 0 18px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);margin-bottom:16px}
  .card .hd{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .card .hd h2{font-size:14.5px;margin:0}
  .card .bd{padding:16px}

  /* buttons */
  .btn{border:1px solid var(--blue);background:var(--blue);color:#fff;border-radius:8px;padding:8px 15px;font-size:13px;font-weight:600}
  .btn:hover{background:var(--blue-d);border-color:var(--blue-d)}
  .btn.green{background:var(--green);border-color:var(--green)}
  .btn.green:hover{background:var(--green-d);border-color:var(--green-d)}
  .btn.navy{background:var(--navy);border-color:var(--navy)}
  .btn.navy:hover{filter:brightness(.93)}
  .btn.ghost{background:#fff;color:var(--blue)}
  .btn.ghost:hover{background:#eef4fb}
  .btn.light{background:#eef1f5;color:var(--ink);border-color:var(--line)}
  .btn.light:hover{background:#e3e8ef}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.sm{padding:6px 11px;font-size:12px}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  .bordered th,.bordered td{border:1px solid var(--line)}
  th,td{text-align:left;padding:9px 11px;vertical-align:middle}
  thead th{background:var(--th);color:#3a4a5d;font-weight:600;font-size:12px}
  tbody tr.zebra:nth-child(even){background:#fafcfe}
  .row-click{cursor:pointer}
  .row-click:hover{background:#eef5fc}
  .listtable td{border-bottom:1px solid var(--line)}
  .listtable tr:last-child td{border-bottom:none}

  .status{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:5px;white-space:nowrap}
  .s-open{background:var(--pendbg);color:var(--pend)}
  .s-done{background:var(--okbg);color:var(--ok)}
  .s-lost{background:var(--warnbg);color:var(--warn)}
  .s-applied{background:#e9eef4;color:var(--sub)}

  /* forms */
  form .field{margin-bottom:13px}
  form label{display:block;font-size:12.5px;color:var(--sub);margin-bottom:5px;font-weight:600}
  form input[type=text],form input[type=number],form input[type=date],form input[type=time],form input[type=email],form input[type=password],form select,form textarea{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
  form textarea{min-height:64px;resize:vertical}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .pubs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  .pub{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px}
  .pub input{width:auto}
  .filterbar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;background:#f6f9fc;border:1px solid var(--line);border-radius:9px;padding:12px;margin-bottom:14px}
  .filterbar .field{margin:0}
  .filterbar input,.filterbar select{padding:7px 9px;border:1px solid var(--line);border-radius:7px}

  /* detail table (配車依頼表 style) */
  .spec{width:100%;border-collapse:collapse;font-size:13px}
  .spec th,.spec td{border:1px solid var(--line);padding:9px 11px}
  .spec th{background:var(--th);width:130px;color:#3a4a5d;font-weight:600;text-align:left}

  .pill-row{display:flex;gap:9px;flex-wrap:wrap}
  .back{background:none;border:none;color:var(--blue);font-size:13px;padding:0;margin-bottom:12px}
  .empty{padding:36px 16px;text-align:center;color:var(--sub);font-size:13px}
  .num{font-variant-numeric:tabular-nums}
  .countbar{font-size:12.5px;color:var(--sub);margin:0 0 8px}
  .countbar b{color:var(--ink)}

  /* mail drawer */
  .drawer-bg{position:fixed;inset:0;background:rgba(20,30,50,.35);z-index:40;display:none}
  .drawer{position:fixed;top:0;right:0;width:420px;max-width:92vw;height:100%;background:#fff;z-index:50;
    transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(20,40,70,.16)}
  .drawer.open{transform:none}
  .drawer .dh{padding:14px 17px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .drawer .dh b{font-size:14.5px}
  .drawer .dh .x{margin-left:auto;border:none;background:none;font-size:20px;color:var(--sub);cursor:pointer}
  .drawer .db{overflow:auto;padding:12px 15px;flex:1}
  .mail{border:1px solid var(--line);border-radius:9px;padding:11px 12px;margin-bottom:10px}
  .mail .mt{font-size:11px;color:var(--sub);display:flex;gap:8px;margin-bottom:5px;flex-wrap:wrap}
  .mail .mto{font-weight:700;color:var(--blue-d)}
  .mail .ms{font-weight:700;font-size:13px;margin-bottom:4px}
  .mail .mb{font-size:12.5px;color:#48515f;white-space:pre-wrap}
  .mail-note{font-size:11.5px;color:var(--sub);background:#f4f8fc;border:1px dashed var(--line);border-radius:8px;padding:9px 11px;margin-bottom:12px}

  /* toast */
  .toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{background:#22303f;color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);
    display:flex;align-items:center;gap:9px;animation:pop .2s ease}
  .toast .d{width:7px;height:7px;border-radius:50%;background:#69d39a}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .hint{background:#eaf2fb;border:1px solid #cfe0f4;color:#274a78;border-radius:9px;padding:11px 14px;font-size:12.5px;margin-bottom:16px;display:flex;gap:9px}
  .hint b{color:#1d3a66}
  .footer-note{margin-top:24px;color:var(--sub);font-size:11.5px;line-height:1.8}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:6px 14px;font-size:13.5px}
  .kv dt{color:var(--sub)} .kv dd{margin:0;font-weight:600}

  /* stat cards (会計連携) */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:14px 16px}
  .stat .lb{font-size:12px;color:var(--sub);margin-bottom:4px}
  .stat .vl{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.01em}
  .stat.warn .vl{color:var(--warn)} .stat.ok .vl{color:var(--ok)}
  .clr{background:none;border:none;color:var(--blue);font-size:12px;padding:0;margin-left:4px}
  .clr:hover{text-decoration:underline}

  /* ===== login ===== */
  .auth{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;
    background:linear-gradient(135deg,#e3eef9 0%,#d4e3f1 50%,#c5d8ec 100%)}
  .auth-card{width:400px;max-width:94vw;background:#fff;border-radius:16px;
    box-shadow:0 12px 40px rgba(20,40,70,.18),0 2px 6px rgba(20,40,70,.08);padding:30px 30px 26px}
  .auth-brand{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:6px}
  .auth-brand .mk{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,#3d6fb1,#5b9bd5);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px;font-weight:700}
  .auth-brand b{font-size:16px;letter-spacing:.02em}
  .auth-sub{text-align:center;color:var(--sub);font-size:12.5px;margin:0 0 22px}
  .auth-card form .field{margin-bottom:14px}
  .auth-card label{display:block;font-size:12.5px;color:var(--sub);margin-bottom:5px;font-weight:600}
  .auth-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-size:14px}
  .auth-card input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(61,111,177,.12)}
  .auth-card .btn-login{width:100%;border:none;background:var(--blue);color:#fff;border-radius:9px;
    padding:12px;font-size:14.5px;font-weight:700;cursor:pointer;margin-top:4px}
  .auth-card .btn-login:hover{background:var(--blue-d)}
  .auth-err{background:var(--warnbg);color:var(--warn);border:1px solid #f0c9c3;border-radius:8px;
    padding:9px 11px;font-size:12.5px;margin-bottom:14px;display:none}
  .auth-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--sub);margin:-4px 0 16px}
  .auth-row a{color:var(--blue);text-decoration:none}
  .auth-demo{margin-top:20px;border-top:1px solid var(--line);padding-top:16px}
  .auth-demo .lb{font-size:11.5px;color:var(--sub);margin-bottom:9px;text-align:center}
  .auth-demo .accs{display:flex;flex-direction:column;gap:7px}
  .auth-demo .acc{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:1px solid var(--line);
    background:#fafcfe;border-radius:9px;padding:9px 11px;font-size:12.5px;color:var(--ink);cursor:pointer}
  .auth-demo .acc:hover{background:#eef5fc;border-color:var(--blue)}
  .auth-demo .acc .tag{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap}
  .auth-demo .acc .tag.p{background:#e7eefc;color:var(--blue-d)}
  .auth-demo .acc .tag.s{background:#e7f4ec;color:var(--ok)}
  .auth-demo .acc b{font-weight:700}
  .auth-demo .acc .em{color:var(--sub);font-size:11px}
  .auth-note{text-align:center;color:var(--sub);font-size:11px;margin:16px 0 0;line-height:1.6}

  /* ===== responsive ===== */
  @media (max-width:820px){
    .shell{flex-direction:column;min-height:0}
    aside{width:100%;flex-shrink:1;border-right:none;border-bottom:1px solid var(--side-2);padding:10px}
    aside .me{padding:4px 6px 8px;margin-bottom:8px}
    aside .nav{flex-direction:row;flex-wrap:wrap}
    aside .nav button{width:auto;flex:1 1 40%;justify-content:center;padding:9px 8px}
    aside .reset{margin-top:10px}
    main{padding:16px 14px 60px}
    .two,.three,.pubs{grid-template-columns:1fr}
    .stats{grid-template-columns:1fr}
    .card .bd{overflow-x:auto;-webkit-overflow-scrolling:touch}
    main .listtable{min-width:600px}
    .spec th{width:96px}
    .drawer{width:100%;max-width:100%}
    header{height:auto;min-height:54px;flex-wrap:wrap;gap:8px;padding:8px 12px}
    .brand{font-size:13px;flex:1 1 auto;min-width:0}
    .brand .bt-full{display:none}
    .brand .bt-short{display:inline}
    .spacer{display:none}
    .role-switch{order:3;flex:1 1 100%;gap:0}
    .role-switch select{flex:1}
    .mail-btn,.logout{order:2}
  }
  @media (max-width:480px){
    h1{font-size:17px}
    .stat .vl{font-size:19px}
    .filterbar{padding:10px}
  }
</style>
</head>
<body>

<!-- login screen -->
<div class="auth" id="auth">
  <div class="auth-card">
    <div class="auth-brand"><span class="mk">運</span><b>運送案件マッチングシステム</b></div>
    <p class="auth-sub">会員制ログイン｜自社あての配車案件のみ閲覧できます</p>
    <div class="auth-err" id="authErr"></div>
    <form onsubmit="doLogin(event)">
      <div class="field"><label>メールアドレス</label>
        <input type="email" id="loginEmail" required placeholder="例）haisha@example-unso.co.jp" autocomplete="username"></div>
      <div class="field"><label>パスワード</label>
        <input type="password" id="loginPw" required placeholder="パスワード" autocomplete="current-password"></div>
      <div class="auth-row"><label style="margin:0;font-weight:400"><input type="checkbox" style="width:auto;margin-right:5px" checked>ログイン状態を保持</label>
        <a href="#" onclick="toast('デモのためパスワード再設定は省略しています');return false">パスワードをお忘れですか？</a></div>
      <button class="btn-login" type="submit">ログイン</button>
    </form>
    <div class="auth-demo">
      <div class="lb">― デモ用：クリックでそのまま入れます ―</div>
      <div class="accs" id="demoAccs"></div>
    </div>
    <p class="auth-note">本デモはブラウザ内のみで動作し、実際のメール送信・認証は行いません。<br>パスワードは任意の文字でログインできます。</p>
  </div>
</div>

<header id="topbar" style="display:none">
  <div class="brand"><span class="mk">運</span><span class="bt-full">運送案件マッチングシステム</span><span class="bt-short">配車マッチング</span></div>
  <div class="spacer"></div>
  <div class="role-switch">
    <label>アカウント切替</label>
    <select id="roleSel" onchange="switchRole(this.value)"></select>
  </div>
  <button class="mail-btn" onclick="openDrawer()">通知メール<span class="badge" id="mailBadge">0</span></button>
  <button class="logout" onclick="logout()">ログアウト</button>
</header>

<div class="shell" id="shell" style="display:none">
  <aside id="side"></aside>
  <main id="main"></main>
</div>

<!-- mail drawer -->
<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="dh"><b>送信された通知メール</b><button class="x" onclick="closeDrawer()">×</button></div>
  <div class="db" id="mailList"></div>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>

        note:'定温5℃管理。手積みなし。',
        publishTo:['c1','c2','c4'], status:'open',
        apps:[
          {id:'AP-1',sub:'c1',enter:'07:30',ttype:'10tウィング',plate:'なにわ100 あ 12-34',driver:'山田 健一',tel:'090-1111-2222',price:46000,status:'applied',at:'06/16 09:12'},
          {id:'AP-2',sub:'c4',enter:'08:00',ttype:'10t平ボディ',plate:'大阪500 か 56-78',driver:'佐藤 浩',tel:'090-3333-4444',price:47500,status:'applied',at:'06/16 10:40'},
        ]},

function registerCase(e){

  const pubs=[...f.querySelectorAll('input[name=pub]:checked')].map(c=>c.value);
  if(!pubs.length){ alert('公開先（2次請会社）を1社以上選択してください。'); return; }
  const n=DB.cases.filter(c=>/^CS-10/.test(c.id)).length;
  const id='CS-'+(1044+n);
  DB.cases.unshift({ id, title:f.title.value, shipper:f.shipper.value, from:f.from.value, to:f.to.value,
    runDate:f.runDate.value, truck:f.truck.value, price:Number(f.price.value||0), qty:f.qty.value, note:f.note.value,
    publishTo:pubs, status:'open', apps:[] });

    `${subName(p)} ご担当者様\n\n新しい配車案件が公開されました。ログインのうえご応募ください。\n\n案件番号：${id}\n運行日：${f.runDate.value}\n区間：${f.from.value} → ${f.to.value}\n車種：${f.truck.value}\n想定単価：${yen(f.price.value||0)}\n\n──────────\n運送案件マッチングシステム（自社配車課）`));
  save(); toast(`${pubs.length}社へ案件通知メールを送信しました`);
  DB.tab.prime='cases'; go('detail',id);
}
function applyCase(e,caseId){
  e.preventDefault(); const f=e.target,c=caseById(caseId);
  const num=Math.max(0,...c.apps.map(a=>+a.id.split('-')[1]))+1;
  const app={ id:'AP-'+num, sub:DB.cur, enter:f.enter.value, ttype:f.ttype.value, plate:f.plate.value,
    driver:f.driver.value, tel:f.tel.value, price:Number(f.price.value||0), status:'applied', at:nowStr() };
  c.apps.push(app);
  sendMail(PRIME.email,PRIME.name,`【応募通知】${c.title}`,
    `${subName(app.sub)} より応募がありました。\n\n案件：${c.id} ${c.title}\n乗務員：${app.driver}／${app.ttype}／${app.plate}\n入場：${app.enter}　希望単価：${yen(app.price)}\n\nタスク一覧よりご確認ください。`);
  save(); toast('応募を送信しました'); go('detail',caseId);
}
function order(caseId,appId){
  const c=caseById(caseId);
  if(!confirm('この応募者に発注します。同案件の他の応募者には失注通知が自動送信されます。よろしいですか？')) return;
  c.status='done';
  c.apps.forEach(a=>{
    if(a.id===appId){ a.status='won';
      sendMail(subEmail(a.sub),subName(a.sub),`【ご発注のお知らせ】${c.title}`,
        `${subName(a.sub)} ご担当者様\n\n下記案件をご発注いたします。配車依頼表をダウンロードのうえ手配をお願いします。\n\n案件番号：${c.id}\n運行日：${c.runDate}\n区間：${c.from} → ${c.to}\n乗務員：${a.driver}／${a.plate}\n単価：${yen(a.price)}\n\n──────────\n運送案件マッチングシステム（自社配車課）`);
    } else if(a.status==='applied'){ a.status='lost';
      sendMail(subEmail(a.sub),subName(a.sub),`【今回のご縁について】${c.title}`,
        `${subName(a.sub)} ご担当者様\n\n誠に恐れ入りますが、案件番号 ${c.id} は他社様への発注となりました。\nまたの機会によろしくお願いいたします。\n\n──────────\n運送案件マッチングシステム（自社配車課）`);
    }
  });
  save();
  const won=c.apps.find(a=>a.id===appId); const lost=c.apps.filter(a=>a.status==='lost').length;
  toast(`発注完了：${subName(won.sub)}へ発注通知${lost?`／${lost}社へ失注通知`:''}`); go('detail',caseId);
}

function escAttr(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function nextCaseId(){ const nums=DB.cases.map(c=>{const m=/^CS-(\d+)/.exec(c.id);return m?+m[1]:0;}); const mx=Math.max(1043,...nums); return 'CS-'+(mx+1); }
function parseCsvLine(line){
  const out=[]; let cur='',q=false;
  for(let i=0;i<line.length;i++){ const ch=line[i];
    if(q){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else { if(ch==='"') q=true; else if(ch===',') {out.push(cur);cur='';} else cur+=ch; } }
  out.push(cur); return out.map(s=>s.trim());
}
function normDate(s){ s=(s||'').trim().replace(/\//g,'-'); const m=/^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(s); if(!m) return s; return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0'); }
function pubsFromText(s){ if(!s) return []; return s.split(/[・,;；、|／\/]+/).map(x=>x.trim()).filter(Boolean)
  .map(nm=>{ const hit=SUBS.find(su=>su.name===nm)||SUBS.find(su=>su.name.includes(nm)||nm.includes(su.name)); return hit?hit.id:null; }).filter(Boolean); }
const BULK_HEAD='案件名,荷主,運行日,積地,卸地,指定車種,想定単価,数量,備考,公開先';

function loadCsvFile(e){ const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ $('bulkText').value=r.result; toast('ファイルを読み込みました。「読み込んで編集する」を押してください'); }; r.readAsText(f,'utf-8'); }
function parseBulk(){
  const raw=($('bulkText').value||'').trim();
  if(!raw){ alert('テンプレートに沿ってデータを貼り付けるか、CSVファイルを選択してください。'); return; }
  let lines=raw.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length && lines[0].includes('案件名')) lines=lines.slice(1);
  const drafts=lines.map(l=>{ const c=parseCsvLine(l);
    return { title:c[0]||'', shipper:c[1]||'', runDate:normDate(c[2]||''), from:c[3]||'', to:c[4]||'',
      truck:c[5]||'', price:Number((c[6]||'').replace(/[^\d.]/g,''))||0, qty:c[7]||'', note:c[8]||'', publishTo:pubsFromText(c[9]||'') }; });
  if(!drafts.length){ alert('読み取れる行がありませんでした。'); return; }
  bulkDraft=drafts; go('bulk');
}
function bulkSetField(i,field,val){ if(field==='price') val=Number(String(val).replace(/[^\d.]/g,''))||0; bulkDraft[i][field]=val; }
function bulkTogglePub(i,pid,on){ const a=bulkDraft[i].publishTo; const j=a.indexOf(pid); if(on&&j<0)a.push(pid); if(!on&&j>=0)a.splice(j,1); }
function bulkRemove(i){ bulkDraft.splice(i,1); render(); }
function bulkAddRow(){ bulkDraft.push({title:'',shipper:'',runDate:'2026-06-20',from:'',to:'',truck:'',price:0,qty:'',note:'',publishTo:[]}); render(); }
function bulkRegister(){
  const bad=[]; bulkDraft.forEach((d,i)=>{ if(!d.title.trim()||!d.publishTo.length) bad.push(i+1); });
  if(bad.length){ alert('案件名と公開先（1社以上）が必要です。未入力の行：'+bad.join('・')+' 行目'); return; }
  if(!confirm(`${bulkDraft.length}件を登録し、選択した公開先へ通知します。よろしいですか？`)) return;
  let mailCount=0;
  bulkDraft.forEach(d=>{
    const id=nextCaseId();
    DB.cases.unshift({ id, title:d.title, shipper:d.shipper, from:d.from, to:d.to, runDate:d.runDate,
      truck:d.truck, price:Number(d.price||0), qty:d.qty, note:d.note, publishTo:d.publishTo.slice(), status:'open', apps:[] });
    d.publishTo.forEach(p=>{ mailCount++; sendMail(subEmail(p),subName(p),`【新規案件のお知らせ】${d.title}`,
      `${subName(p)} ご担当者様\n\n新しい配車案件が公開されました。ログインのうえご応募ください。\n\n案件番号：${id}\n運行日：${d.runDate}\n区間：${d.from} → ${d.to}\n車種：${d.truck}\n数量：${d.qty||'―'}\n想定単価：${yen(d.price||0)}\n\n──────────\n運送案件マッチングシステム（自社配車課）`); });
  });
  const n=bulkDraft.length; bulkDraft=[]; save();
  toast(`${n}件を登録し、のべ${mailCount}社へ通知しました`); DB.tab.prime='cases'; go('list');
}
function bulkEdit(){
  if(!bulkDraft.length){ return `<div class="crumb">ホーム ／ 新規案件登録 ／ 一括登録</div><button class="back" onclick="nav('new')">← 新規登録に戻る</button><div class="empty">取り込んだデータがありません。</div>`; }

      <td>${inp('truck','text','車種',80)}</td><td>${inp('price','number','',70)}</td><td>${inp('qty','text','数量',80)}</td>
      <td>${inp('note','text','備考',100)}</td><td style="min-width:200px">${pubs}</td>
      <td><button class="btn light sm" onclick="bulkRemove(${i})">削除</button></td></tr>`;
  }).join('');

function registerRegular(e){
  e.preventDefault(); const f=e.target;
  const nums=(DB.regulars||[]).map(r=>{const m=/^RG-(\d+)/.exec(r.id);return m?+m[1]:0;});
  const id='RG-'+String(Math.max(0,...nums)+1).padStart(2,'0');
  (DB.regulars=DB.regulars||[]).unshift({ id, title:f.title.value, shipper:f.shipper.value, from:f.from.value, to:f.to.value,
    truck:f.truck.value, price:Number(f.price.value||0), qty:f.qty.value, freq:f.freq.value, carrier:f.carrier.value, note:f.note.value, active:true });
  save(); toast(`定期便 ${id} を登録しました`); go('regular');
}
function toggleRegular(id){ const r=(DB.regulars||[]).find(x=>x.id===id); if(!r) return; r.active=!r.active; save(); toast(r.active?'定期便を再開しました':'定期便を停止しました'); render(); }
function regularToCase(id){
  const r=(DB.regulars||[]).find(x=>x.id===id); if(!r) return;
  if(!confirm(`「${r.title}」を案件化し、${subName(r.carrier)} へ通知します。よろしいですか？\n（数量などは案件登録後にも調整できます）`)) return;
  const cid=nextCaseId();
  DB.cases.unshift({ id:cid, title:r.title, shipper:r.shipper, from:r.from, to:r.to, runDate:'2026-06-20',
    truck:r.truck, price:Number(r.price||0), qty:r.qty, note:(r.note||'')+`（定期便 ${r.id} より）`, publishTo:[r.carrier], status:'open', apps:[] });
  sendMail(subEmail(r.carrier),subName(r.carrier),`【新規案件のお知らせ】${r.title}`,
    `${subName(r.carrier)} ご担当者様\n\n定期便の配車案件が公開されました。ログインのうえご応募ください。\n\n案件番号：${cid}\n運行日：2026-06-20\n区間：${r.from} → ${r.to}\n車種：${r.truck}\n数量：${r.qty||'―'}\n想定単価：${yen(r.price||0)}\n\n──────────\n運送案件マッチングシステム（自社配車課）`);
  save(); toast(`案件 ${cid} を作成し、${subName(r.carrier)} へ通知しました`); DB.tab.prime='cases'; go('detail',cid);
}

function wonApp(c){ return c.apps.find(x=>x.status==='won'); }
function dealAmt(c){ const a=wonApp(c); return a?a.price:c.price; }
function markPaid(id,v){ const c=caseById(id); c.paid=v; save();
  toast(v?'入金を消込しました（会計連携対象に反映）':'入金消込を取り消しました'); render(); }
function exportCSV(){
  const done=DB.cases.filter(c=>c.status==='done');
  if(!done.length){ alert('発注済（確定）の案件がありません。'); return; }
  const head=['案件番号','運行日','荷主','受注会社','単価','入金状態','消込日'];
  const rows=done.map(c=>{ const a=wonApp(c)||{};
    return [c.id,c.runDate,c.shipper||'',subName(a.sub),dealAmt(c),c.paid?'入金済':'未入金',c.paid?'2026/06/16':'']; });
  const csv=[head,...rows].map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='会計連携_発注一覧_20260616.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('会計ソフト取込用CSVを出力しました');
}
function billing(){
  const done=DB.cases.filter(c=>c.status==='done');
  const total=done.reduce((s,c)=>s+dealAmt(c),0);
  const unpaidList=done.filter(c=>!c.paid);
  const unpaid=unpaidList.reduce((s,c)=>s+dealAmt(c),0);
  const rows=done.map(c=>{ const a=wonApp(c)||{};
    const badge=c.paid?'<span class="status s-done">入金済</span>':'<span class="status s-open">未入金</span>';

      ? `<button class="btn light sm" onclick="markPaid('${c.id}',false)">消込取消</button>`
      : `<button class="btn green sm" onclick="markPaid('${c.id}',true)">入金消込</button>`;
    return `<tr class="zebra"><td class="num">${c.id}</td><td><b>${c.title}</b><br><span style="color:var(--sub);font-size:12px">${c.shipper||'―'}</span></td>

  <button class="back" onclick="nav('cases')">← 一覧に戻る</button>
  <h1>新規案件の登録</h1><p class="lead">1件ずつの登録に加え、決まった書式（FMT）で複数案件をまとめて取り込めます。公開先に選んだ会社へ、登録と同時に案件通知メールが自動送信されます。</p>

  <div class="card"><div class="hd"><h2>FMTで一括登録</h2><span style="margin-left:auto;color:var(--sub);font-size:12px">複数案件をまとめて取り込み → 数量などを個別に編集 → 一括登録</span></div><div class="bd">
    <div class="hint" style="margin-bottom:12px"><div>テンプレート（CSV）に沿って貼り付けるか、CSVファイルを選択してください。読み込み後に1行ずつ内容を編集できます。<br><span style="color:var(--sub)">列：案件名 / 荷主 / 運行日 / 積地 / 卸地 / 指定車種 / 想定単価 / 数量 / 備考 / 公開先（会社名を「・」区切り）</span></div></div>
    <div class="pill-row" style="margin-bottom:10px">
      <button class="btn light sm" type="button" onclick="downloadTemplate()">テンプレートCSVをダウンロード</button>
      <label class="btn light sm" style="display:inline-block">CSVファイルを選択<input type="file" accept=".csv,.txt" style="display:none" onchange="loadCsvFile(event)"></label>
      <button class="btn light sm" type="button" onclick="fillSampleBulk()">サンプルを貼り付け</button>
    </div>
    <textarea id="bulkText" style="width:100%;min-height:120px;font-family:monospace;font-size:12.5px;padding:10px;border:1px solid var(--line);border-radius:8px" placeholder="案件名,荷主,運行日,積地,卸地,指定車種,想定単価,数量,備考,公開先"></textarea>
    <div class="pill-row" style="margin-top:10px"><button class="btn navy" type="button" onclick="parseBulk()">読み込んで編集する</button></div>
  </div></div>

  <div class="card"><div class="hd"><h2>1件ずつ登録</h2></div><div class="bd"><form onsubmit="registerCase(event)">
    <div class="field"><label>案件名</label><input type="text" name="title" required placeholder="例）食品定温 大阪→名古屋 10t"></div>
    <div class="two"><div class="field"><label>荷主</label><input type="text" name="shipper" placeholder="例）カネサ食品㈱"></div>
      <div class="field"><label>運行日</label><input type="date" name="runDate" required value="2026-06-20"></div></div>
    <div class="two"><div class="field"><label>積地</label><input type="text" name="from" required placeholder="例）大阪府茨木市"></div>
      <div class="field"><label>卸地</label><input type="text" name="to" required placeholder="例）愛知県小牧市"></div></div>
    <div class="three"><div class="field"><label>指定車種</label><input type="text" name="truck" placeholder="例）10tウィング"></div>
      <div class="field"><label>想定単価（円）</label><input type="number" name="price" placeholder="48000"></div>
      <div class="field"><label>数量</label><input type="text" name="qty" placeholder="例）パレット16枚"></div></div>
    <div class="field"><label>備考</label><textarea name="note" placeholder="荷役条件・温度管理など"></textarea></div>
    <div class="field"><label>公開先（2次請会社）＊案件ごとに選択</label>
      <div class="pubs">${SUBS.map(s=>`<label class="pub"><input type="checkbox" name="pub" value="${s.id}">${s.name}</label>`).join('')}</div></div>
    <div class="pill-row"><button class="btn" type="submit">登録して選択先へ通知</button>
      <button class="btn light" type="button" onclick="nav('cases')">キャンセル</button></div>
  </form></div></div>`;
}

/* ---- 元請：案件詳細 ---- */
function primeDetail(id){
  const c=caseById(id); if(!c) return primeList();
  const st=c.status==='open'?'<span class="status s-open">募集中</span>':'<span class="status s-done">発注済</span>';
  const rows=c.apps.map(a=>{
    const badge=a.status==='won'?'<span class="status s-done">発注</span>':a.status==='lost'?'<span class="status s-lost">失注</span>':'<span class="status s-applied">応募中</span>';
    const btn=(c.status==='open')?`<button class="btn green sm" onclick="order('${c.id}','${a.id}')">この応募者に発注</button>`
      :(a.status==='won'?`<button class="btn ghost sm" onclick="haishaPDF('${c.id}')">配車依頼表PDF</button>`:'―');
    return `<tr class="zebra"><td><b>${subName(a.sub)}</b><br><span style="color:var(--sub);font-size:12px">${a.at}</span></td>
      <td>${a.enter}</td><td>${a.ttype}</td><td>${a.plate}</td><td>${a.driver}</td><td class="num">${a.tel}</td>
      <td class="num"><b>${yen(a.price)}</b></td><td>${badge}</td><td>${btn}</td></tr>`;
  }).join('');
  return `<div class="crumb">ホーム ／ 案件タスク一覧 ／ ${c.id}</div>
  <button class="back" onclick="nav('cases')">← 一覧に戻る</button>
  <h1>${c.title} ${st}</h1><p class="lead">案件番号 ${c.id}</p>
  <div class="card"><div class="hd"><h2>案件情報</h2></div><div class="bd">
    <table class="spec"><tr><th>荷主</th><td>${c.shipper||'―'}</td><th>運行日</th><td>${c.runDate}</td></tr>
      <tr><th>積地</th><td>${c.from}</td><th>卸地</th><td>${c.to}</td></tr>
      <tr><th>指定車種</th><td>${c.truck||'―'}</td><th>想定単価</th><td>${yen(c.price)}</td></tr>
      <tr><th>数量</th><td>${c.qty||'―'}</td><th>公開先</th><td>${c.publishTo.map(subName).join('、')}</td></tr>
      <tr><th>備考</th><td colspan="3">${c.note||'―'}</td></tr></table></div></div>
  <div class="card"><div class="hd"><h2>応募情報（${c.apps.length}件）</h2>
    <span style="margin-left:auto;color:var(--sub);font-size:12px">${c.status==='done'?'発注済':'発注すると他社へ自動で失注通知'}</span></div>
    <div class="bd" style="padding:0">
    <table class="listtable"><thead><tr><th>会社 / 応募日時</th><th>入場</th><th>車種</th><th>車番</th><th>乗務員名</th><th>電話番号</th><th>希望単価</th><th>状態</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan=9 class="empty">まだ応募がありません。右上で2次請けアカウントに切替えて応募できます。</td></tr>'}</tbody></table>
  </div></div>`;
}

/* ---- 2次請け：状態判定（共通） ---- */
function subStatusInfo(c,me){
  const mine=c.apps.find(a=>a.sub===me);
  if(c.status==='done'){
    if(mine&&mine.status==='won') return {key:'won',label:'受注',badge:'<span class="status s-done">受注</span>',act:`<button class="btn ghost sm" onclick="haishaPDF('${c.id}')">配車依頼表PDF</button>`};
    if(mine&&mine.status==='lost') return {key:'lost',label:'失注',badge:'<span class="status s-lost">失注</span>',act:'―'};
    return {key:'other',label:'他社発注',badge:'<span class="status s-applied">他社発注</span>',act:'―'};
  }
  if(mine&&mine.status==='applied') return {key:'applied',label:'応募済',badge:'<span class="status s-applied">応募済</span>',act:`<button class="btn light sm" onclick="go('detail','${c.id}')">内容確認</button>`};
  return {key:'open',label:'募集中',badge:'<span class="status s-open">募集中</span>',act:`<button class="btn green sm" onclick="go('detail','${c.id}')">応募する</button>`};
}
function subStatusSelect(target,cur,opts){
  return `<div class="field"><label>状態</label><select onchange="${target}=this.value;render()">`+
    opts.map(([v,l])=>`<option value="${v}" ${cur===v?'selected':''}>${l}</option>`).join('')+`</select></div>`;
}

/* ---- 2次請け：応募案件一覧 ---- */
function subList(){
  const me=DB.cur; const all=DB.cases.filter(c=>c.publishTo.includes(me));
  const trucks=[...new Set(all.map(c=>c.truck).filter(Boolean))];
  let visible=all.slice();
  if(filt.sub.date)  visible=visible.filter(c=>c.runDate===filt.sub.date);
  if(filt.sub.truck) visible=visible.filter(c=>c.truck===filt.sub.truck);
  if(filt.sub.status!=='all') visible=visible.filter(c=>subStatusInfo(c,me).key===filt.sub.status);
  const rows=visible.map(c=>{
    const si=subStatusInfo(c,me);
    return `<tr class="zebra"><td class="num">${c.id}</td><td><b>${c.title}</b><br><span style="color:var(--sub);font-size:12px">${c.from} → ${c.to}</span></td>
      <td>${c.runDate}</td><td>${c.truck}</td><td class="num">${yen(c.price)}</td><td>${si.badge}</td><td>${si.act}</td></tr>`;
  }).join('');
  const filtered=(filt.sub.date||filt.sub.truck||filt.sub.status!=='all');
  return `<div class="crumb">マイページ ／ 応募案件一覧</div><h1>応募案件一覧</h1>
  <p class="lead">自社が公開先に選ばれている案件のみ表示されます（会員制・自社あてのみ閲覧可）。</p>
  <div class="hint"><div><b>2次請け業者の画面です。</b>「応募する」で入場時間・車種・車番・乗務員名・電話・希望単価を入力。発注されると配車依頼表PDFを取得できます。</div></div>
  <div class="filterbar"><div class="field"><label>運行日</label><input type="date" value="${filt.sub.date}" oninput="filt.sub.date=this.value;render()"></div>
    <div class="field"><label>車種</label><select onchange="filt.sub.truck=this.value;render()">
      <option value="">すべて</option>${trucks.map(t=>`<option value="${t}" ${filt.sub.truck===t?'selected':''}>${t}</option>`).join('')}</select></div>
    ${subStatusSelect('filt.sub.status',filt.sub.status,[['all','すべて'],['open','募集中'],['applied','応募済'],['won','受注'],['lost','失注'],['other','他社発注']])}
    <button class="btn navy sm" onclick="render()">検索</button>
    <button class="btn light sm" onclick="filt.sub={date:'',truck:'',status:'all'};render()">クリア</button></div>
  <p class="countbar">該当 <b>${visible.length}</b> 件${filtered?` <span style="color:var(--sub)">／ 全${all.length}件中</span>`:''}</p>
  <div class="card"><div class="bd" style="padding:0">
    <table class="listtable"><thead><tr><th>案件番号</th><th>案件名 / 区間</th><th>運行日</th><th>車種</th><th>想定単価</th><th>状態</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan=7 class="empty">該当する案件はありません。</td></tr>'}</tbody></table>
  </div></div>`;
}

/* ---- 2次請け：応募済み案件一覧 ---- */
function appliedList(){
  const me=DB.cur; const all=DB.cases.filter(c=>c.apps.some(a=>a.sub===me));
  let visible=all.slice();
  if(filt.applied.status!=='all') visible=visible.filter(c=>subStatusInfo(c,me).key===filt.applied.status);
  const rows=visible.map(c=>{
    const si=subStatusInfo(c,me); const mine=c.apps.find(a=>a.sub===me);
    return `<tr class="zebra"><td class="num">${c.id}</td><td><b>${c.title}</b><br><span style="color:var(--sub);font-size:12px">${c.from} → ${c.to}</span></td>
      <td>${c.runDate}</td><td>${c.truck}</td><td class="num">${yen(mine.price)}</td><td>${mine.at}</td><td>${si.badge}</td><td>${si.act}</td></tr>`;
  }).join('');
  const won=all.filter(c=>subStatusInfo(c,me).key==='won').length;
  const waiting=all.filter(c=>subStatusInfo(c,me).key==='applied').length;
  const filtered=filt.applied.status!=='all';
  return `<div class="crumb">マイページ ／ 応募済み案件一覧</div><h1>応募済み案件一覧</h1>
  <p class="lead">これまでに応募した案件の結果をまとめて確認できます。受注した案件は配車依頼表PDFをダウンロードできます。</p>
  <div class="hint"><div><b>発注されると「受注」になり、配車依頼表PDFを取得できます。</b>結果待ち ${waiting} 件／受注 ${won} 件。</div></div>
  <div class="filterbar">
    ${subStatusSelect('filt.applied.status',filt.applied.status,[['all','すべて'],['applied','応募済（結果待ち）'],['won','受注'],['lost','失注']])}
    <button class="btn light sm" onclick="filt.applied={status:'all'};render()">クリア</button></div>
  <p class="countbar">該当 <b>${visible.length}</b> 件${filtered?` <span style="color:var(--sub)">／ 全${all.length}件中</span>`:''}</p>
  <div class="card"><div class="bd" style="padding:0">
    <table class="listtable"><thead><tr><th>案件番号</th><th>案件名 / 区間</th><th>運行日</th><th>車種</th><th>応募単価</th><th>応募日時</th><th>状態</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan=8 class="empty">まだ応募した案件はありません。「応募案件一覧」から応募できます。</td></tr>'}</tbody></table>
  </div></div>`;
}

/* ---- 2次請け：案件詳細 / 応募 ---- */
function subDetail(id){
  const c=caseById(id); if(!c) return subList();
  const me=DB.cur;
  if(!c.publishTo.includes(me)) return `<button class="back" onclick="nav('cases')">← 一覧に戻る</button><div class="empty">この案件は貴社に公開されていません。</div>`;
  const mine=c.apps.find(a=>a.sub===me); let panel='';
  if(mine&&mine.status==='won'){
    panel=`<div class="card"><div class="hd"><h2>受注しました</h2><span class="status s-done" style="margin-left:auto">受注</span></div><div class="bd">
      <p style="margin-top:0">本案件は貴社に発注されました。配車依頼表をダウンロードしてください。</p>
      <button class="btn" onclick="haishaPDF('${c.id}')">配車依頼表PDFをダウンロード</button></div></div>`;
  } else if(mine&&mine.status==='lost'){
    panel=`<div class="card"><div class="bd"><span class="status s-lost">失注</span> 本案件は他社への発注となりました。</div></div>`;
  } else if(mine){
    panel=`<div class="card"><div class="hd"><h2>応募内容</h2><span class="status s-applied" style="margin-left:auto">応募済・結果待ち</span></div><div class="bd">
      <table class="spec"><tr><th>入場時間</th><td>${mine.enter}</td><th>車種</th><td>${mine.ttype}</td></tr>
        <tr><th>車番</th><td>${mine.plate}</td><th>乗務員名</th><td>${mine.driver}</td></tr>
        <tr><th>電話番号</th><td>${mine.tel}</td><th>希望単価</th><td>${yen(mine.price)}</td></tr></table></div></div>`;
  } else if(c.status==='open'){
    panel=`<div class="card"><div class="hd"><h2>この案件に応募する</h2></div><div class="bd"><form onsubmit="applyCase(event,'${c.id}')">
      <div class="three"><div class="field"><label>入場時間</label><input type="time" name="enter" required value="08:00"></div>
        <div class="field"><label>車種</label><input type="text" name="ttype" required value="${c.truck||''}"></div>
        <div class="field"><label>車番</label><input type="text" name="plate" required placeholder="なにわ100 あ 12-34"></div></div>
      <div class="three"><div class="field"><label>乗務員名</label><input type="text" name="driver" required placeholder="山田 太郎"></div>
        <div class="field"><label>電話番号</label><input type="text" name="tel" required placeholder="090-1234-5678"></div>
        <div class="field"><label>希望単価（円）</label><input type="number" name="price" required placeholder="${c.price}"></div></div>
      <button class="btn green" type="submit">この内容で応募する</button></form></div></div>`;
  } else { panel=`<div class="card"><div class="bd">この案件は募集を終了しました（他社発注）。</div></div>`; }
  return `<div class="crumb">マイページ ／ 応募案件一覧 ／ ${c.id}</div>
  <button class="back" onclick="nav('cases')">← 一覧に戻る</button>
  <h1>${c.title}</h1><p class="lead">案件番号 ${c.id}</p>
  <div class="card"><div class="hd"><h2>案件情報</h2></div><div class="bd">
    <table class="spec"><tr><th>荷主</th><td>${c.shipper||'―'}</td><th>運行日</th><td>${c.runDate}</td></tr>
      <tr><th>積地</th><td>${c.from}</td><th>卸地</th><td>${c.to}</td></tr>
      <tr><th>指定車種</th><td>${c.truck||'―'}</td><th>想定単価</th><td>${yen(c.price)}</td></tr>
      <tr><th>数量</th><td colspan="3">${c.qty||'―'}</td></tr>
      <tr><th>備考</th><td colspan="3">${c.note||'―'}</td></tr></table></div></div>
  ${panel}`;
}

/* ---- 2次請け：ユーザー情報 ---- */
function myPage(){
  const r=curRole();
  return `<div class="crumb">マイページ ／ ユーザー情報</div><h1>ユーザー情報</h1>
  <p class="lead">会員登録情報を確認・編集します。</p>
  <div class="card" style="max-width:560px"><div class="bd">
    <table class="spec"><tr><th>会社名</th><td>${r.name}</td></tr>
      <tr><th>担当者名</th><td>${r.user}</td></tr>
      <tr><th>メールアドレス</th><td>${r.email}</td></tr>
      <tr><th>パスワード</th><td>●●●●●●●●</td></tr></table>
    <div class="pill-row" style="margin-top:14px"><button class="btn light" onclick="toast('デモのため編集は省略しています')">編集</button></div>
  </div></div>`;
}

showLogin();
</script>
